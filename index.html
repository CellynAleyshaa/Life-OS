<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Grace's Safe Space</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌿 Grace's Safe Space</h1>
            <h3 id="day-display">Day 1</h3> <div id="clock">00:00:00</div>
            <p>Banyuwangi Edition | Ryzen 5 System</p>
        </header>

        <section class="section">
            <h2>🕌 Jadwal Sholat</h2>
            <div class="grid-mini">
                <div class="p-item" id="fajr">Subuh: --:--</div>
                <div class="p-item" id="dhuhr">Dzuhur: --:--</div>
                <div class="p-item" id="asr">Ashar: --:--</div>
                <div class="p-item" id="maghrib">Maghrib: --:--</div>
                <div class="p-item" id="isha">Isya: --:--</div>
            </div>
        </section>

        <section class="section">
            <h2>✨ Daily Calm</h2>
            <div class="mini-card">
                <span>Istigfar (150x)</span>
                <div class="counter-area"><span id="istigfar-count">0</span>/150</div>
                <button class="btn-pray" onclick="countIstigfar()">CLICK</button>
            </div>
            <div class="task-list">
                <label><input type="checkbox" id="check-sholat"> Sholat 5 Waktu</label>
                <label><input type="checkbox" id="check-water"> Minum Air Putih</label>
                <label><input type="checkbox" id="check-bed"> Rapikan Kasur</label>
                <label><input type="checkbox" id="check-window"> Lihat Langit 1 Menit</label>
                <label><input type="checkbox" id="check-journal"> Tulis Perasaan di Notepad</label>
            </div>
        </section>

        <section class="section">
            <h2>🚀 Achievement Loop</h2>
            <div class="card">
                <div class="badge">Level 1</div>
                <h3>Deep Focus</h3>
                <p>Belajar/Coding 20 Menit Tanpa Sosmed.</p>
                <button class="btn-main" onclick="completeTask()">Selesai</button>
            </div>
        </section>

        <button class="reset-btn" onclick="resetSystem()">Reset Hari Baru</button>
    </div>

    <audio id="adhanAudio" src="https://www.islamcan.com/audio/adhan/azan1.mp3"></audio>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
